<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mappe Tematiche – Roma Capitale</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<!-- GeoRaster per raster TIF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4/2.9.0/proj4.min.js"></script>
<script src="https://unpkg.com/georaster@1.6.0/dist/georaster.browser.bundle.min.js"></script>
<script src="https://unpkg.com/georaster-layer-for-leaflet@3.10.0/dist/georaster-layer-for-leaflet.min.js"></script>

<style>
  :root {
    --bg:        #F7F5F0;
    --panel:     #FFFFFF;
    --border:    #E0DDD6;
    --text:      #1A1A1A;
    --text-muted:#6B6660;
    --accent:    #C1440E;
    --header-h:  56px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    height: var(--header-h);
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    flex-shrink: 0;
    z-index: 1000;
  }

  .header-badge {
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 3px;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .header-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: auto;
  }

  .app {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .sidebar-section {
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-section:last-child { border-bottom: none; }

  .cat-header {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .layer-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    cursor: pointer;
    user-select: none;
  }

  .layer-row:hover .layer-name { color: var(--text); }

  .layer-icon {
    width: 26px; height: 26px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 13px;
  }

  .layer-name {
    font-size: 13px;
    color: var(--text-muted);
    flex: 1;
    line-height: 1.3;
    transition: color 0.15s;
  }

  .layer-row.active .layer-name { color: var(--text); font-weight: 500; }

  .toggle {
    position: relative;
    width: 32px; height: 18px;
    flex-shrink: 0;
  }

  .toggle input { opacity: 0; width: 0; height: 0; }

  .toggle-track {
    position: absolute; inset: 0;
    background: var(--border);
    border-radius: 9px;
    transition: background 0.2s;
    cursor: pointer;
  }

  .toggle-track::after {
    content: '';
    position: absolute;
    left: 2px; top: 2px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.2s;
    box-shadow: 0 1px 2px rgba(0,0,0,0.15);
  }

  .toggle input:checked + .toggle-track { background: var(--accent); }
  .toggle input:checked + .toggle-track::after { transform: translateX(14px); }

  .layer-count {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg);
    border-radius: 10px;
    padding: 1px 6px;
    flex-shrink: 0;
  }

  #map {
    flex: 1;
    height: 100%;
    z-index: 1;
  }

  .leaflet-popup-content-wrapper {
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    padding: 0;
    overflow: hidden;
    min-width: 220px;
  }

  .leaflet-popup-content { margin: 0; width: auto !important; }

  .popup-header {
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border);
  }

  .popup-tipo {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .popup-nome {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .municipio-label {
    background: transparent;
    border: none;
    box-shadow: none;
    font-size: 9px;
    font-weight: 700;
    color: #333;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
    pointer-events: none;
  }

  .municipio-label::before { display: none; }

  #loading {
    position: fixed; inset: 0;
    background: rgba(247,245,240,0.92);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999;
    gap: 14px;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { font-size: 14px; color: var(--text-muted); }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Caricamento mappe tematiche…</p>
</div>

<header>
  <span class="header-badge">Piano Caldo</span>
  <h1>Mappe Tematiche – Roma</h1>
  <span class="header-sub">Roma Capitale · Ufficio Clima</span>
</header>

<div class="app">
  <nav class="sidebar">

    <!-- MAPPE TEMATICHE -->
    <div class="sidebar-section">
      <div class="cat-header">Mappe tematiche</div>

      <label class="layer-row active" id="row-hm">
        <span class="layer-icon" style="background:#F5EEF8;">🌡️</span>
        <span class="layer-name">Indice di raffrescamento urbano</span>
        <span class="layer-count" id="count-hm">–</span>
        <span class="toggle">
          <input type="checkbox" id="tog-hm" checked onchange="toggleLayer('hm', this)">
          <span class="toggle-track"></span>
        </span>
      </label>

      <div style="margin:4px 0 12px;">
        <div style="display:flex;height:10px;border-radius:3px;overflow:hidden;margin-bottom:3px;">
          <div style="flex:1;background:#9e0142;"></div>
          <div style="flex:1;background:#d53e4f;"></div>
          <div style="flex:1;background:#f46d43;"></div>
          <div style="flex:1;background:#fdae61;"></div>
          <div style="flex:1;background:#fee08b;"></div>
          <div style="flex:1;background:#ffffbf;"></div>
          <div style="flex:1;background:#e6f598;"></div>
          <div style="flex:1;background:#abdda4;"></div>
          <div style="flex:1;background:#66c2a5;"></div>
          <div style="flex:1;background:#3288bd;"></div>
          <div style="flex:1;background:#5e4fa2;"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted);">
          <span>0 (basso)</span><span>1 (alto)</span>
        </div>
      </div>

      <label class="layer-row active" id="row-areaintervento">
        <span class="layer-icon" style="background:#FDEEEE;">🔴</span>
        <span class="layer-name">Aree prioritarie intervento caldo</span>
        <span class="layer-count" id="count-areaintervento">–</span>
        <span class="toggle">
          <input type="checkbox" id="tog-areaintervento" checked onchange="toggleLayer('areaintervento', this)">
          <span class="toggle-track"></span>
        </span>
      </label>

      <div style="margin:4px 0 4px;">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
          <div style="width:14px;height:14px;background:#8B0000;border-radius:2px;flex-shrink:0;"></div>
          <span style="font-size:11px;color:var(--text-muted);">Priorità 1</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
          <div style="width:14px;height:14px;background:#E57373;border-radius:2px;flex-shrink:0;"></div>
          <span style="font-size:11px;color:var(--text-muted);">Priorità 2</span>
        </div>
      </div>
    </div>

    <!-- CONFINI -->
    <div class="sidebar-section">
      <div class="cat-header">Confini amministrativi</div>

      <label class="layer-row active" id="row-comune">
        <span class="layer-icon" style="background:#F0F0F0;">🗺️</span>
        <span class="layer-name">Comune di Roma</span>
        <span class="layer-count" id="count-comune">–</span>
        <span class="toggle">
          <input type="checkbox" id="tog-comune" checked onchange="toggleLayer('comune', this)">
          <span class="toggle-track"></span>
        </span>
      </label>

      <label class="layer-row active" id="row-municipi">
        <span class="layer-icon" style="background:#F0F0F0;">📍</span>
        <span class="layer-name">Municipi</span>
        <span class="layer-count" id="count-municipi">–</span>
        <span class="toggle">
          <input type="checkbox" id="tog-municipi" checked onchange="toggleLayer('municipi', this)">
          <span class="toggle-track"></span>
        </span>
      </label>
    </div>

  </nav>

  <div id="map"></div>
</div>

<script>
const map = L.map('map', { center: [41.9028, 12.4964], zoom: 11 });

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 19,
}).addTo(map);

map.createPane('poligoni');
map.getPane('poligoni').style.zIndex = 350;

const allLayers = {};

// ── SCALA SPECTRAL ─────────────────────────────────────────────────
const SPECTRAL_COLORS = [
  [158,  1, 66],[213, 62, 79],[244,109, 67],[253,174, 97],[254,224,139],
  [255,255,191],[230,245,152],[171,221,164],[102,194,165],[ 50,136,189],[ 94, 79,162],
];

function spectralColor(value) {
  if (value === null || value === undefined || isNaN(value)) return null;
  const idx = Math.min(Math.floor(value * SPECTRAL_COLORS.length), SPECTRAL_COLORS.length - 1);
  const [r, g, b] = SPECTRAL_COLORS[idx];
  return `rgba(${r},${g},${b},0.75)`;
}

// ── RASTER ─────────────────────────────────────────────────────────
async function loadRaster() {
  try {
    const resp = await fetch('hm.tif');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const buffer = await resp.arrayBuffer();
    const georaster = await parseGeoraster(buffer);
    const layer = new GeoRasterLayer({
      georaster,
      opacity: 0.75,
      pixelValuesToColorFn: values => {
        const v = values[0];
        if (v === georaster.noDataValue || v === null || isNaN(v)) return null;
        return spectralColor(Math.max(0, Math.min(1, v)));
      },
      resolution: 256,
    });
    allLayers['hm'] = L.layerGroup([layer]);
    allLayers['hm'].addTo(map);
    const el = document.getElementById('count-hm');
    if (el) el.textContent = '✓';
  } catch(e) {
    const el = document.getElementById('count-hm');
    if (el) { el.textContent = '–'; }
    console.warn('hm.tif non caricato:', e.message);
  }
}

// ── AREA INTERVENTO ────────────────────────────────────────────────
async function loadAreaIntervento() {
  const group = L.layerGroup();
  try {
    const resp = await fetch('areaintervento.geojson');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    let count = 0;
    L.geoJSON(data, {
      pane: 'poligoni',
      style: function(f) {
        const v = f.properties['layer'];
        const fillColor = v === '1' ? '#8B0000' : '#E57373';
        return { fillColor, fillOpacity: 0.65, color: fillColor, weight: 0.5, opacity: 0.8, pane: 'poligoni' };
      },
      onEachFeature: function(feature, layer) {
        const priorita = feature.properties['layer'] === '1' ? 'Priorità 1' : 'Priorità 2';
        layer.bindPopup(
          '<div class="popup-header"><div class="popup-tipo">Area prioritaria intervento caldo</div>' +
          '<div class="popup-nome">' + priorita + '</div></div>',
          { maxWidth: 240 }
        );
        count++;
      }
    }).addTo(group);
    const el = document.getElementById('count-areaintervento');
    if (el) el.textContent = count;
  } catch(e) {
    const el = document.getElementById('count-areaintervento');
    if (el) el.textContent = '–';
    console.warn('areaintervento non caricato:', e.message);
  }
  allLayers['areaintervento'] = group;
  group.addTo(map);
}

// ── CONFINI ────────────────────────────────────────────────────────
const CONFINE_CONFIG = {
  comune:   { file: 'Comune.geojson',   color: '#111', weight: 2,   dash: null },
  municipi: { file: 'Municipi.geojson', color: '#444', weight: 1,   dash: '4 3' },
};

async function loadConfine(id) {
  const cfg = CONFINE_CONFIG[id];
  const group = L.layerGroup();
  try {
    const resp = await fetch(cfg.file);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    let count = 0;
    L.geoJSON(data, {
      style: { color: cfg.color, weight: cfg.weight, opacity: 0.85, fill: false, dashArray: cfg.dash },
      onEachFeature: function(feature, layer) {
        if (id === 'municipi') {
          const p = feature.properties || {};
          const nome = p.Nome || p.NOME || p.name || p.NAME || p.municipio || p.MUNICIPIO || '';
          if (nome) layer.bindTooltip(nome, { permanent: true, direction: 'center', className: 'municipio-label' });
        }
        count++;
      }
    }).addTo(group);
    const el = document.getElementById('count-' + id);
    if (el) el.textContent = count;
  } catch(e) {
    const el = document.getElementById('count-' + id);
    if (el) el.textContent = '–';
    console.warn('Confine ' + id + ' non caricato:', e.message);
  }
  allLayers[id] = group;
  group.addTo(map);
}

// ── TOGGLE ─────────────────────────────────────────────────────────
function toggleLayer(id, checkbox) {
  const row = document.getElementById('row-' + id);
  if (checkbox.checked) {
    if (allLayers[id]) map.addLayer(allLayers[id]);
    if (row) row.classList.add('active');
  } else {
    if (allLayers[id]) map.removeLayer(allLayers[id]);
    if (row) row.classList.remove('active');
  }
}

// ── INIT ───────────────────────────────────────────────────────────
async function init() {
  const promises = [
    loadRaster(),
    loadAreaIntervento(),
    loadConfine('comune'),
    loadConfine('municipi'),
  ];
  await Promise.allSettled(promises);
  document.getElementById('loading').style.display = 'none';
}

init();
</script>
</body>
</html>
